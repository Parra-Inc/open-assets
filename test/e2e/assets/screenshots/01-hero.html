<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=440" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 440px;
      height: 956px;
      overflow: hidden;
      background: linear-gradient(180deg, #EFF6FF 0%, #DBEAFE 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
    }
    .glow-blue { width: 300px; height: 300px; background: #3B82F6; top: -80px; right: -60px; }
    .glow-green { width: 200px; height: 200px; background: #10B981; bottom: 200px; left: -40px; }
    .content {
      position: relative;
      z-index: 10;
      padding: 48px 32px 0;
      text-align: center;
    }
    h1 {
      font-size: 42px;
      font-weight: 800;
      color: #1E293B;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }
    h1 .accent {
      display: inline-block;
      background: #3B82F6;
      color: white;
      padding: 2px 14px 6px;
      border-radius: 12px;
    }
    .subtitle {
      font-size: 16px;
      color: #64748B;
      line-height: 1.4;
    }
    .phone-area {
      position: relative;
      z-index: 10;
      margin-top: 32px;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .phone {
      width: 280px;
      height: 580px;
      background: #1E293B;
      border-radius: 36px;
      padding: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 26px;
      overflow: hidden;
      background: white;
    }
    .phone-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .step-badge {
      position: absolute;
      bottom: 120px;
      right: 20px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(59,130,246,0.2);
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .step-badge .emoji { font-size: 20px; }
    .step-badge .text { font-size: 13px; font-weight: 700; color: #1E293B; }
  </style>
</head>
<body>
  <div class="glow glow-blue"></div>
  <div class="glow glow-green"></div>

  <div class="content">
    <h1>{{hero_title}}</h1>
    <p class="subtitle">{{hero_subtitle}}</p>
  </div>

  <div class="phone-area">
    <div class="phone">
      <div class="phone-screen">
        <img src="../../public/screenshots/01-home.svg" alt="Home screen" />
      </div>
    </div>
    <div class="step-badge">
      <span class="emoji">👟</span>
      <span class="text">{{step_count}}</span>
    </div>
  </div>
</body>
</html>
