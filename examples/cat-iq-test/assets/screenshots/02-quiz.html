<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=440" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'bg-dark': '#0F0328',
              'bg-mid': '#1F0A47',
              'bg-light': '#331066',
              'bg-card': 'rgba(255, 255, 255, 0.06)',
              'border-card': 'rgba(255, 255, 255, 0.1)',
              'accent-purple': '#7C3AED',
              'accent-pink': '#EC4899',
              'accent-orange': '#F97316',
              'iq-oblivious': '#3B82F6',
              'iq-selective': '#14B8A6',
              'iq-average': '#22C55E',
              'iq-smart': '#F97316',
              'iq-genius': '#8B5CF6',
              'iq-mastermind': '#EF4444',
              'cert-gold': '#F59E0B',
              'cert-gold-light': '#FCD34D',
            },
            fontFamily: {
              'sans': ['"SF Pro Rounded"', '"SF Pro Display"', '-apple-system', 'system-ui', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style type="text/tailwindcss">
/* =============================================
   SCREENSHOT FRAME - 440x956
   ============================================= */
.screenshot {
  width: 440px;
  height: 956px;
  overflow: hidden;
  position: relative;
  font-family: "SF Pro Rounded", "SF Pro Display", -apple-system, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* =============================================
   BACKGROUNDS
   ============================================= */
.bg-app-gradient {
  background: linear-gradient(
    180deg,
    #0F0328 0%,
    #1F0A47 50%,
    #331066 100%
  );
}

/* =============================================
   MARKETING HEADLINE TEXT
   ============================================= */
.headline {
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: white;
}

.headline-gradient {
  background: linear-gradient(180deg, #fff 30%, rgba(255, 255, 255, 0.7));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subheadline {
  font-weight: 500;
  color: rgba(255, 255, 255, 0.55);
  line-height: 1.4;
}

/* =============================================
   PHONE MOCKUP
   ============================================= */
.phone {
  position: relative;
  background: #1a1a1a;
  border-radius: 32px;
  padding: 8px;
  box-shadow:
    0 25px 60px rgba(0, 0, 0, 0.6),
    0 0 0 1px rgba(255, 255, 255, 0.08),
    0 0 80px rgba(124, 58, 237, 0.15);
}

/* Dynamic Island */
.phone::before {
  content: "";
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 72px;
  height: 22px;
  background: #000;
  border-radius: 12px;
  z-index: 10;
}

.phone-screen {
  border-radius: 24px;
  overflow: hidden;
  position: relative;
  background: #0F0328;
}

/* Scale a 440x956 app UI into a smaller phone frame */
.phone-content {
  width: 440px;
  height: 956px;
  transform-origin: top left;
  font-family: "SF Pro Rounded", "SF Pro Display", -apple-system, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* Phone screen = 260px wide → scale 260/440 = 0.5909 */
.phone-260 .phone-screen {
  width: 260px;
  height: 565px;
}
.phone-260 .phone-content {
  transform: scale(0.5909);
}

/* Phone screen = 300px wide → scale 300/440 = 0.6818 */
.phone-300 .phone-screen {
  width: 300px;
  height: 652px;
}
.phone-300 .phone-content {
  transform: scale(0.6818);
}

/* Phone screen = 220px wide → scale 220/440 = 0.5 (for dual phone layouts) */
.phone-220 .phone-screen {
  width: 220px;
  height: 478px;
}
.phone-220 .phone-content {
  transform: scale(0.5);
}

/* =============================================
   APP UI COMPONENTS (inside phone)
   ============================================= */

.glass-card {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
}

.btn-primary {
  background: linear-gradient(135deg, #7C3AED, #EC4899);
  border-radius: 9999px;
  padding: 16px 40px;
  font-weight: 700;
  font-size: 18px;
  color: white;
  text-align: center;
  box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
}

.btn-orange {
  background: linear-gradient(135deg, #F97316, #FB923C);
  border-radius: 9999px;
  padding: 16px 40px;
  font-weight: 700;
  font-size: 18px;
  color: white;
  text-align: center;
  box-shadow: 0 8px 24px rgba(249, 115, 22, 0.35);
}

.progress-bar {
  height: 8px;
  border-radius: 9999px;
  background: rgba(255, 255, 255, 0.1);
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 9999px;
  background: linear-gradient(90deg, #7C3AED, #EC4899);
}

.glow-purple {
  box-shadow: 0 0 40px rgba(124, 58, 237, 0.4), 0 0 80px rgba(124, 58, 237, 0.2);
}

.glow-gold {
  box-shadow: 0 0 40px rgba(245, 158, 11, 0.4), 0 0 80px rgba(245, 158, 11, 0.2);
}

.status-bar { height: 54px; }
.home-indicator { height: 34px; }

.cert-title {
  font-family: Georgia, "Times New Roman", serif;
  background: linear-gradient(180deg, #FCD34D, #F59E0B);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.answer-pill {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 14px;
  padding: 14px 18px;
  color: white;
  font-size: 16px;
  text-align: left;
}

.answer-pill-selected {
  background: rgba(124, 58, 237, 0.3);
  border-color: #7C3AED;
}

.category-badge {
  background: rgba(124, 58, 237, 0.25);
  border: 1px solid rgba(124, 58, 237, 0.4);
  border-radius: 9999px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 600;
  color: #C4B5FD;
}

.skill-bar {
  height: 10px;
  border-radius: 9999px;
  background: rgba(255, 255, 255, 0.08);
  overflow: hidden;
}

.skill-bar-fill {
  height: 100%;
  border-radius: 9999px;
}

/* =============================================
   DECORATIVE ELEMENTS
   ============================================= */

/* Ambient glow orb (positioned absolutely) */
.glow-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.3;
  pointer-events: none;
}

/* Floating badge / callout */
.callout {
  background: rgba(15, 3, 40, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 16px;
  padding: 12px 16px;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(20px);
}
    </style>
  </head>
  <body class="m-0 p-0">
    <!--
      LAYOUT: Headline top, phone tilted the opposite direction from hero,
      with a floating callout badge highlighting the category system
    -->
    <div class="screenshot bg-app-gradient flex flex-col items-center">
      <!-- Ambient glow -->
      <div class="glow-orb w-[180px] h-[180px] bg-accent-pink top-[200px] -left-[20px]"></div>
      <div class="glow-orb w-[140px] h-[140px] bg-accent-purple top-[500px] right-[-20px]"></div>

      <!-- Marketing headline -->
      <div class="relative z-10 pt-16 pb-6 px-8 text-center">
        <h1 class="headline headline-gradient text-[36px] mb-4">
          20 Science-Based<br/>Questions
        </h1>
        <p class="subheadline text-[15px] px-4">
          Covering cognition, memory, problem<br/>solving, and social skills
        </p>
      </div>

      <!-- Phone mockup — tilted opposite direction -->
      <div class="relative z-10 mt-2" style="transform: perspective(900px) rotateY(4deg) rotateX(1deg);">
        <!-- Floating callout badge — positioned top-right of phone -->
        <div class="callout absolute -top-2 -right-6 z-20 flex items-center gap-2">
          <span class="text-[18px]">🧠</span>
          <div>
            <div class="text-[11px] text-white/40 font-medium">Category</div>
            <div class="text-[13px] font-bold text-white">Cognition</div>
          </div>
        </div>

        <div class="phone phone-300">
          <div class="phone-screen">
            <!-- Replace with real screenshot: quiz question screen -->
            <img src="../../public/img/screenshots/02-quiz.png" alt="Quiz screen" style="width: 100%; height: 100%; object-fit: cover; display: block;" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
