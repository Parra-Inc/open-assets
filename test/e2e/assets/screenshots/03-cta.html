<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=440" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 440px;
      height: 956px;
      overflow: hidden;
      background: linear-gradient(180deg, #EFF6FF 0%, #BFDBFE 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .content {
      position: relative;
      z-index: 10;
      padding: 64px 32px 0;
      text-align: center;
    }
    h1 {
      font-size: 44px;
      font-weight: 800;
      color: #1E293B;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    h1 .accent {
      display: inline-block;
      background: #3B82F6;
      color: white;
      padding: 2px 16px 6px;
      border-radius: 14px;
    }
    .subtitle {
      font-size: 18px;
      color: #64748B;
      line-height: 1.4;
      margin-bottom: 40px;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 40px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(0,0,0,0.06);
      border-radius: 100px;
      padding: 10px 20px 10px 14px;
      font-size: 14px;
      font-weight: 700;
      color: #1E293B;
    }
    .badge .emoji { font-size: 18px; }
    .stars {
      display: flex;
      gap: 4px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .star {
      width: 32px;
      height: 32px;
      color: #F59E0B;
    }
    .rating-text {
      font-size: 16px;
      font-weight: 600;
      color: #64748B;
      margin-bottom: 48px;
    }
    .cta-button {
      display: inline-block;
      background: #3B82F6;
      color: white;
      font-size: 20px;
      font-weight: 700;
      padding: 18px 48px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(59,130,246,0.35);
    }
  </style>
</head>
<body>
  <div class="content">
    <h1><span class="accent">{{cta_title}}</span></h1>
    <p class="subtitle">{{cta_subtitle}}</p>

    <div class="badges">
      <div class="badge"><span class="emoji">🚫</span> {{cta_badge_1}}</div>
      <div class="badge"><span class="emoji">🔒</span> {{cta_badge_2}}</div>
      <div class="badge"><span class="emoji">⚡</span> {{cta_badge_3}}</div>
    </div>

    <div class="stars">
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </div>
    <p class="rating-text">{{cta_rating}}</p>

    <div class="cta-button">{{app_name}}</div>
  </div>
</body>
</html>
