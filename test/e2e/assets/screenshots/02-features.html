<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=440" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 440px;
      height: 956px;
      overflow: hidden;
      background: linear-gradient(180deg, #ECFDF5 0%, #D1FAE5 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
    }
    .glow-green { width: 280px; height: 280px; background: #10B981; top: -60px; left: -40px; }
    .glow-blue { width: 200px; height: 200px; background: #3B82F6; bottom: 300px; right: -30px; }
    .content {
      position: relative;
      z-index: 10;
      padding: 48px 32px 0;
      text-align: center;
    }
    h1 {
      font-size: 40px;
      font-weight: 800;
      color: #1E293B;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }
    h1 .accent {
      display: inline-block;
      background: #10B981;
      color: white;
      padding: 2px 14px 6px;
      border-radius: 12px;
    }
    .subtitle {
      font-size: 16px;
      color: #64748B;
      line-height: 1.4;
    }
    .phone-area {
      position: relative;
      z-index: 10;
      margin-top: 28px;
      width: 100%;
      display: flex;
      justify-content: center;
    }
    .phone {
      width: 280px;
      height: 580px;
      background: #1E293B;
      border-radius: 36px;
      padding: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 26px;
      overflow: hidden;
      background: white;
    }
    .phone-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .callout {
      position: absolute;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(16,185,129,0.2);
      border-radius: 16px;
      padding: 10px 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 20;
    }
    .callout .icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(16,185,129,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .callout .label { font-size: 11px; color: #64748B; }
    .callout .value { font-size: 15px; font-weight: 700; color: #1E293B; }
    .callout-1 { top: 280px; left: 14px; }
    .callout-2 { top: 440px; right: 14px; }
  </style>
</head>
<body>
  <div class="glow glow-green"></div>
  <div class="glow glow-blue"></div>

  <div class="content">
    <h1><span class="accent">{{features_title}}</span></h1>
    <p class="subtitle">{{features_subtitle}}</p>
  </div>

  <div class="phone-area">
    <div class="phone">
      <div class="phone-screen">
        <img src="../../public/screenshots/02-workout.svg" alt="Workout screen" />
      </div>
    </div>
    <div class="callout callout-1">
      <div class="icon">🏋️</div>
      <div>
        <div class="label">{{features_callout_1_label}}</div>
        <div class="value">{{features_callout_1_value}}</div>
      </div>
    </div>
    <div class="callout callout-2">
      <div class="icon">🔥</div>
      <div>
        <div class="label">{{features_callout_2_label}}</div>
        <div class="value">{{features_callout_2_value}}</div>
      </div>
    </div>
  </div>
</body>
</html>
