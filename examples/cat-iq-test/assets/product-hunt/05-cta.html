<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1270, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'bg-dark': '#0F0328',
              'bg-mid': '#1F0A47',
              'bg-light': '#331066',
              'bg-card': 'rgba(255, 255, 255, 0.06)',
              'border-card': 'rgba(255, 255, 255, 0.1)',
              'accent-purple': '#7C3AED',
              'accent-pink': '#EC4899',
              'accent-orange': '#F97316',
              'iq-oblivious': '#3B82F6',
              'iq-selective': '#14B8A6',
              'iq-average': '#22C55E',
              'iq-smart': '#F97316',
              'iq-genius': '#8B5CF6',
              'iq-mastermind': '#EF4444',
              'cert-gold': '#F59E0B',
              'cert-gold-light': '#FCD34D',
            },
            fontFamily: {
              'sans': ['"SF Pro Rounded"', '"SF Pro Display"', '-apple-system', 'system-ui', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              display: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        margin: 0;
        width: 1270px;
        height: 760px;
        overflow: hidden;
      }
      .headline-gradient {
        background: linear-gradient(180deg, #fff 30%, rgba(255, 255, 255, 0.7));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
      }
      .glow-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
      }
      .float-1 { transform: rotate(-6deg); }
      .float-2 { transform: rotate(8deg); }
      .float-3 { transform: rotate(-3deg); }
      .float-4 { transform: rotate(5deg); }
    </style>
  </head>
  <body>
    <div
      class="relative flex h-[760px] w-[1270px] flex-col items-center justify-center overflow-hidden"
      style="
        background: linear-gradient(
          135deg,
          #0f0328 0%,
          #1f0a47 50%,
          #331066 100%
        );
      "
    >
      <!-- App icon top-right -->
      <div class="absolute top-8 right-8 z-20" style="width: 72px; height: 72px; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);">
        <div style="width: 72px; height: 72px; position: relative; background: linear-gradient(155deg, #0c0020 0%, #1a0540 30%, #2d1066 55%, #4c1d95 80%, #5b21b6 100%);">
          <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%); width: 60px; height: 60px; border-radius: 50%; background: radial-gradient(circle, rgba(139,92,246,0.3) 0%, rgba(109,40,217,0.15) 45%, transparent 75%);"></div>
          <img src="../../public/logo.svg" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 66px; height: 66px;" />
        </div>
      </div>

      <!-- Ambient glow orbs -->
      <div class="glow-orb" style="width: 400px; height: 400px; background: #7c3aed; top: -100px; left: -80px; opacity: 0.3;"></div>
      <div class="glow-orb" style="width: 350px; height: 350px; background: #ec4899; bottom: -80px; right: -60px; opacity: 0.25;"></div>
      <div class="glow-orb" style="width: 200px; height: 200px; background: #7c3aed; top: 300px; right: 200px; opacity: 0.15;"></div>

      <!-- Floating classification emojis -->
      <div class="pointer-events-none absolute inset-0 overflow-hidden">
        <div class="float-1 absolute top-8 left-12 glass-card rounded-2xl px-4 py-3 opacity-[0.15]">
          <span class="text-2xl">😴</span>
        </div>
        <div class="float-2 absolute right-16 bottom-16 glass-card rounded-2xl px-4 py-3 opacity-[0.15]">
          <span class="text-2xl">😈</span>
        </div>
        <div class="float-3 absolute top-24 right-48 glass-card rounded-2xl px-4 py-3 opacity-[0.12]">
          <span class="text-2xl">🎓</span>
        </div>
        <div class="float-4 absolute bottom-28 left-20 glass-card rounded-2xl px-4 py-3 opacity-[0.12]">
          <span class="text-2xl">🧐</span>
        </div>
        <div class="float-1 absolute top-6 left-[480px] glass-card rounded-2xl px-3 py-2.5 opacity-[0.10]">
          <span class="text-xl">😺</span>
        </div>
        <div class="float-2 absolute bottom-10 left-[400px] glass-card rounded-2xl px-3 py-2.5 opacity-[0.10]">
          <span class="text-xl">🤨</span>
        </div>

        <!-- Sparkles -->
        <svg class="absolute top-16 left-[220px]" width="18" height="18" viewBox="0 0 24 24" fill="#7C3AED" opacity="0.3">
          <path d="M12 0l3 9h9l-7.5 5.5L19.5 24 12 18l-7.5 6 3-9.5L0 9h9z" />
        </svg>
        <svg class="absolute top-36 right-[200px]" width="14" height="14" viewBox="0 0 24 24" fill="#EC4899" opacity="0.25">
          <path d="M12 0l3 9h9l-7.5 5.5L19.5 24 12 18l-7.5 6 3-9.5L0 9h9z" />
        </svg>
        <svg class="absolute bottom-36 left-[200px]" width="12" height="12" viewBox="0 0 24 24" fill="#7C3AED" opacity="0.2">
          <path d="M12 0l3 9h9l-7.5 5.5L19.5 24 12 18l-7.5 6 3-9.5L0 9h9z" />
        </svg>
        <svg class="absolute right-[240px] bottom-44" width="16" height="16" viewBox="0 0 24 24" fill="#F59E0B" opacity="0.2">
          <path d="M12 0l3 9h9l-7.5 5.5L19.5 24 12 18l-7.5 6 3-9.5L0 9h9z" />
        </svg>
      </div>

      <!-- Main content -->
      <div class="relative z-10 text-center">
        <!-- App badge -->
        <div class="mb-4 inline-flex items-center gap-2.5 glass-card rounded-full px-5 py-2.5">
          <span class="text-xl">🐱</span>
          <span class="text-sm font-bold text-white">Cat IQ Test</span>
        </div>

        <h2
          class="headline-gradient font-display text-[50px] leading-tight font-extrabold tracking-tight"
        >
          Find out how smart<br/>
          <span class="relative inline-block">
            <span
              class="absolute inset-0 -skew-x-2 rounded-lg bg-[#7C3AED]/40"
            ></span>
            <span class="relative z-10" style="-webkit-text-fill-color: white;">your cat really is</span>
          </span>
        </h2>
        <p class="mx-auto mt-4 max-w-[550px] text-lg text-white/50">
          Take the quiz, get a beautiful IQ certificate, and share it with your cat-loving friends.
        </p>
      </div>

      <!-- App Store badge + QR code -->
      <div class="relative z-10 mt-8 flex items-center justify-center gap-6">
        <!-- App Store badge -->
        <div class="flex flex-col items-center gap-2">
          <img src="../../public/img/AppStoreBadge.svg" alt="Download on the App Store" style="height: 54px;" />
          <p class="text-[11px] text-white/30 font-medium">or search <span class="text-white/50 font-semibold">"Cat IQ Test"</span></p>
        </div>

        <!-- Arrow -->
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0">
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </svg>

        <!-- QR code -->
        <div class="flex flex-col items-center gap-2">
          <div class="rounded-xl bg-white p-2.5" style="box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 40px rgba(124,58,237,0.1);">
            <img src="../../public/img/qr-appstore.svg" alt="QR Code" style="width: 100px; height: 100px; display: block;" />
          </div>
          <span class="text-[11px] font-medium text-white/30">Scan to download</span>
        </div>
      </div>

      <!-- Feature pills -->
      <div class="relative z-10 mt-6 flex gap-3">
        <div class="flex items-center gap-2 rounded-full glass-card px-4 py-2 text-sm text-white/50">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          Free to Start
        </div>
        <div class="flex items-center gap-2 rounded-full glass-card px-4 py-2 text-sm text-white/50">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#EC4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          No Account Required
        </div>
        <div class="flex items-center gap-2 rounded-full glass-card px-4 py-2 text-sm text-white/50">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          Share Results Anywhere
        </div>
      </div>

      <!-- Product Hunt upvote reminder -->
      <div class="relative z-10 mt-8 flex items-center justify-center">
        <div
          class="inline-flex items-center gap-2.5 rounded-full border-2 border-[#ff6154] bg-[#ff6154]/10 px-6 py-2.5"
          style="box-shadow: 0 0 30px rgba(255, 97, 84, 0.15);"
        >
          <svg width="18" height="18" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="20" fill="#ff6154" />
            <path
              d="M22.5 15H17v10h3v-3h2.5a3.5 3.5 0 100-7zm0 4H20v-1h2.5a1.5 1.5 0 110 1z"
              fill="white"
            />
          </svg>
          <span class="text-sm font-bold text-[#ff6154]"
            >If you dig it, upvote us on Product Hunt!</span
          >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#ff6154"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 19V5M5 12l7-7 7 7" />
          </svg>
        </div>
      </div>
    </div>
  </body>
</html>
